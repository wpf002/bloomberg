services:
  postgres:
    # AURORA Module 5: TimescaleDB extension on top of Postgres 15.
    # Existing tables/data continue to work — TimescaleDB is additive
    # (CREATE EXTENSION inside ensure_schema). Switching back to plain
    # postgres:15-alpine would only break the AURORA hypertables.
    image: timescale/timescaledb:latest-pg15
    container_name: bt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bloomberg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bloomberg}
      POSTGRES_DB: ${POSTGRES_DB:-bloomberg}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bloomberg}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bt-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: bt-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-bt-meili-dev-key}
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: ${APP_ENV:-development}
    ports:
      - "${MEILISEARCH_PORT:-7700}:7700"
    volumes:
      - meili_data:/meili_data
    # No healthcheck: the official image lacks wget/curl, and the backend
    # already gates every Meili call on a runtime /health probe so the app
    # works even if this service starts late or never. depends_on uses
    # `service_started` instead of `service_healthy` for the same reason.

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bt-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-true}
      POSTGRES_USER: ${POSTGRES_USER:-bloomberg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bloomberg}
      POSTGRES_DB: ${POSTGRES_DB:-bloomberg}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-bt-meili-dev-key}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      FRED_API_KEY: ${FRED_API_KEY:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      FMP_API_KEY: ${FMP_API_KEY:-}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-bloomberg-terminal research@example.com}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      JWT_SECRET: ${JWT_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      FINRA_API_KEY: ${FINRA_API_KEY:-}
      FINRA_API_SECRET: ${FINRA_API_SECRET:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: bt-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
  meili_data:
